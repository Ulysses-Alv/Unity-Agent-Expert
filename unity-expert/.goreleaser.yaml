# goreleaser.yaml for unity-agent-expert
version: 2

project_name: unity-agent-expert

before:
  hooks:
    - go mod tidy

builds:
  - id: unity-agent-expert
    main: ./cmd/unity-expert
    binary: unity-agent-expert
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    format: zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: Ulysses-Alv
    name: Unity-Agent-Expert
  prerelease: false